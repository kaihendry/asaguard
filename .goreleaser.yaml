version: 2

project_name: asaguard

before:
  hooks:
    - go mod tidy

builds:
  - id: asaguard
    main: ./cmd/asaguard
    binary: asaguard
    ldflags:
      - -s -w -X main.version={{.Tag}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "asaguard_{{ .Os }}_{{ .Arch }}"
    formats:
      - binary

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: kaihendry
    name: asaguard
